name: install-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  install-matrix:
    name: install on ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:22.04
            label: Ubuntu 22.04 (jammy)
            # jammy's default python3 is 3.10 < ai-r's requires-python (3.11).
            # universe ships python3.11; install.sh probes PATH and picks it up.
            extra-packages: python3.11 python3.11-venv
          - image: ubuntu:24.04
            label: Ubuntu 24.04 (noble)
            extra-packages: ""
          - image: ubuntu:devel
            label: Ubuntu devel (rolling)
            extra-packages: ""
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install OS deps (python3-venv)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3 python3-venv python3-pip git ca-certificates sudo \
            ${{ matrix.extra-packages }}

      - name: Run install.sh (auto mode)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # The user-mode fallback kicks in when sudo NOPASSWD isn't configured.
          bash install.sh auto
          echo "---- verifying ----"
          ~/.local/bin/ai-r --version
          ls -l ~/.local/bin/ai-r-mcp

      - name: Run install.sh (opt mode — sudo NOPASSWD)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "ALL ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ci
          chmod 0440 /etc/sudoers.d/ci
          bash install.sh opt
          echo "---- verifying ----"
          /opt/ai-r/.venv/bin/ai-r --version
          ls -l /opt/ai-r/.venv/bin/ai-r-mcp

      - name: Re-run install.sh (idempotency check)
        run: |
          bash install.sh auto

      - name: Uninstall
        run: |
          bash uninstall.sh
