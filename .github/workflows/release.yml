name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --quiet build
          python -m build

      # Pre-flight, so a broken artifact fails here instead of at the upload,
      # after the tag is already public. `twine check` is what caught nothing on
      # 0.4.1: the publish action's own twine was too old to read
      # Metadata-Version 2.4 and reported the Name/Version fields as missing.
      - name: Check distribution metadata
        run: |
          python -m pip install --quiet twine
          python -m twine check --strict dist/*
          python - <<'PY'
          import pathlib, sys, tomllib, zipfile
          name = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["name"]
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              sys.exit("no wheel built")
          meta = zipfile.ZipFile(wheels[0]).read(
              next(n for n in zipfile.ZipFile(wheels[0]).namelist() if n.endswith(".dist-info/METADATA"))
          ).decode()
          fields = dict(
              line.split(": ", 1) for line in meta.splitlines() if ": " in line and not line.startswith(" ")
          )
          for key in ("Name", "Version", "Metadata-Version"):
              if key not in fields:
                  sys.exit(f"wheel METADATA is missing {key}")
          print(f"{fields['Name']} {fields['Version']} (Metadata-Version {fields['Metadata-Version']})")
          if fields["Name"].replace("_", "-").lower() != name.replace("_", "-").lower():
              sys.exit(f"wheel says {fields['Name']}, pyproject says {name}")
          PY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC) — no token stored anywhere
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      # v1.9.0 ships a twine that only understands Metadata-Version <= 2.3 and
      # rejects what current setuptools emits (2.4) as "missing Name, Version".
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
