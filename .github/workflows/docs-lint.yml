name: Docs lint

# Machine gate for what used to be a human promise: the English surface stays
# English, and relative links resolve. Same script as `make docs-lint` locally —
# stdlib only, so no install step and no network.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: No Cyrillic in English docs, no broken relative links
        run: |
          python3 scripts/docs_lint.py
