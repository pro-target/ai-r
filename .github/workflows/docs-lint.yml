name: Docs lint

# Machine gate for what used to be a human promise: the English surface stays
# English, and relative links resolve. Same script as `make docs-lint` locally —
# stdlib only, so no install step and no network.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: No Cyrillic in English docs, no broken relative links
        run: |
          python3 scripts/docs_lint.py
